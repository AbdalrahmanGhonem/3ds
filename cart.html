<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>3DS - Cart</title>
    <meta name="description" content="Your 3DS cart.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/mockup.css?v=4">
  </head>
  <body class="mockup-site" data-page="cart">
    <div class="mock-shell">
      <header class="mock-header">
        <div class="mock-container mock-header__inner">
          <a href="index.html" class="mock-brand" aria-label="3DS Printing home"><img src="/assets/brand-logo.svg" alt="3DS Printing logo" class="mock-brand__logo"></a>
          <nav class="mock-nav" aria-label="Primary">
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="about.html">About</a>
            <a href="faq.html">FAQ</a>
            <a href="contact.html">Contact</a>
          </nav>
          <div class="mock-header__icons">
            <button class="mock-icon-button" type="button" aria-label="Search"><span data-icon="search"></span></button>
            <button class="mock-icon-button" type="button" aria-label="Account"><span data-icon="user"></span></button>
            <a href="cart.html" class="mock-icon-button mock-cart-link" aria-label="Cart"><span data-icon="cart"></span><span class="mock-cart-count" data-cart-count>0</span></a>
            <button class="mock-icon-button mock-menu-button" type="button" aria-label="Menu"><span data-icon="menu"></span></button>
          </div>
        </div>
      </header>

      <main>
        <section class="mock-container mock-page-section">
          <div id="cart-page-content"></div>
        </section>
      </main>

      <footer class="mock-footer">
        <div class="mock-container mock-footer__grid">
          <div>
            <h3>3DS</h3>
            <p>Premium-looking 3D printed articulated keychains made for gifting and everyday style.</p>
          </div>
          <div>
            <h4>Shop</h4>
            <div class="mock-footer__links">
              <p>All Products</p>
              <p>Best Sellers</p>
              <p>New Arrivals</p>
            </div>
          </div>
          <div>
            <h4>Info</h4>
            <div class="mock-footer__links">
              <p>About</p>
              <p>FAQ</p>
              <p>Contact</p>
            </div>
          </div>
          <div>
            <h4>Support</h4>
            <div class="mock-footer__links">
              <p>Cash on Delivery</p>
              <p>2-3 Day Delivery</p>
              <p>Easy Returns</p>
            </div>
          </div>
        </div>
      </footer>
    </div>

    <script src="assets/mockup.js?v=4" defer></script>
    <script src="assets/auth.js?v=9" defer></script>
  </body>
</html>
